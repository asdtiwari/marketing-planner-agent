version: '3.8'

services:
  # 1. Database Service
  mysql-db:
    image: mysql:8.0
    container_name: marketing_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: marketing_agent
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql  # Keeps data safe if container crashes
    networks:
      - app-network

  # 2. Python Backend Service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketing_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Notice how the backend talks to the DB using the container name 'mysql-db'
      - DATABASE_URL=mysql+pymysql://root:${DB_PASSWORD:-root}@mysql-db:3306/marketing_agent
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - mysql-db
    networks:
      - app-network

  # 3. React Frontend Service
  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketing_frontend
    restart: always
    ports:
      - "80:80" # Maps EC2 Port 80 to Nginx Port 80
    depends_on:
      - backend-api
    networks:
      - app-network

# Define the persistent storage volume
volumes:
  mysql_data:

# Define the private bridge network
networks:
  app-network:
    driver: bridge