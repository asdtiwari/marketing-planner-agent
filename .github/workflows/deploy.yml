name: Marketing Agent CI/CD

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/marketing-backend:latest

      # Build and Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/marketing-frontend:latest

  deploy-to-ec2:
    name: Deploy to EC2 Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory (optional, if you keep K8s files there)
            cd ~/marketing-planner-agent
            
            # Pull the latest code (optional, to keep the server in sync)
            git pull origin main
            
            # Apply configurations just in case they changed
            kubectl apply -f marketing-config.yaml
            kubectl apply -f deployment.yaml
            
            # Force Kubernetes to pull the new images and restart the pods
            kubectl rollout restart deployment marketing-stack
            
            echo "Deployment Successful!"
