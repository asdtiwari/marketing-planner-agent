name: Marketing Agent CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Build and Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marketing-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/marketing-backend:${{ env.IMAGE_TAG }}

      # 🔹 Build and Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marketing-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/marketing-frontend:${{ env.IMAGE_TAG }}

  deploy-to-ec2:
    name: Deploy to EC2 Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          IMAGE_TAG: ${{ github.run_number }}   
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GROQ_KEY,OPENROUTER_KEY,DB_URL,IMAGE_TAG
          script: |
            cd ~/marketing-planner-agent
            git pull origin main

            # 🔹 Update ConfigMap
            kubectl create configmap marketing-config \
              --from-literal=GROQ_API_KEY="$GROQ_KEY" \
              --from-literal=OPENROUTER_API_KEY="$OPENROUTER_KEY" \
              --from-literal=DATABASE_URL="$DB_URL" \
              --from-literal=VITE_API_URL="/api" \
              --from-literal=CORS_ORIGINS="*" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f mysql.yaml
            kubectl apply -f deployment.yaml
            kubectl apply -f services.yaml

            # Use versioned images instead of 'latest'
            kubectl set image deployment/marketing-stack \
              backend=${{ secrets.DOCKER_USERNAME }}/marketing-backend:$IMAGE_TAG \
              frontend=${{ secrets.DOCKER_USERNAME }}/marketing-frontend:$IMAGE_TAG

            kubectl rollout status deployment marketing-stack

            echo "Deployment with version $IMAGE_TAG successful!"