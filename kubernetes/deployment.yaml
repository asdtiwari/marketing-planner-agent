apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      role: app
  template:
    metadata:
      labels:
        role: app
    spec:
      containers:
      # --- Backend Container ---
      - name: backend
        image: asdtiwari/marketing-backend:v1
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: marketing-config
      # --- Frontend Container ---
      - name: frontend
        image: asdtiwari/marketing-frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 80